title: Suspicious Scheduled Task Creation via Command Line
id: c9f5e2a3-7d6f-6c0b-1e4a-3f5b7d9e1a2b
status: experimental
description: |
    Detects scheduled task creation via schtasks.exe with suspicious
    command-line arguments including script interpreters, download cradles,
    or execution from user-writable directories. Commonly used by malware
    for persistence after initial access.
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Faizaan Sajjad
date: 2025/01/01
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1053.005
logsource:
    category: process_creation
    product: windows
detection:
    selection_tool:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: '/create'
    selection_suspicious:
        CommandLine|contains:
            - 'powershell'
            - 'cmd /c'
            - 'wscript'
            - 'cscript'
            - 'mshta'
            - 'rundll32'
            - 'http://'
            - 'https://'
            - '%TEMP%'
            - '%APPDATA%'
    condition: selection_tool and selection_suspicious
fields:
    - Image
    - CommandLine
    - ParentImage
    - User
falsepositives:
    - Software installers creating update tasks
    - RMM tools creating maintenance tasks
    - SCCM or Intune management tasks
level: medium
