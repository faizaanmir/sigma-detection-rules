title: Lateral Movement via SMB Admin Share Access
id: e1b7a4c5-9f8b-8e2d-3a6c-5b7d9f1a3c4d
status: experimental
description: |
    Detects lateral movement by identifying a single account accessing
    Windows administrative shares (C$, ADMIN$, IPC$) on multiple distinct
    hosts within a short timeframe. Commonly observed with PsExec,
    Pass-the-Hash, or manual attacker lateral movement.
references:
    - https://attack.mitre.org/techniques/T1021/002/
author: Faizaan Sajjad
date: 2025/01/01
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 5140
        ShareName|contains:
            - '\C$'
            - '\ADMIN$'
            - '\IPC$'
    condition: selection | count(Computer) by SubjectUserName > 3
fields:
    - SubjectUserName
    - IpAddress
    - ShareName
    - Computer
falsepositives:
    - SCCM software deployment
    - IT admin remote management tools
    - Vulnerability scanners with admin credentials
level: high
