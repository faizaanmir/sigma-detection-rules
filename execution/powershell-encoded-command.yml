title: Suspicious PowerShell Encoded or Obfuscated Command
id: d0a6f3b4-8e7a-7d1c-2f5b-4a6c8e0f2b3c
status: experimental
description: |
    Detects PowerShell execution using encoded commands or common obfuscation
    patterns including Invoke-Expression (IEX), DownloadString, and
    FromBase64String. Frequently used by malware loaders and post-exploitation
    frameworks to evade script block logging and AV detection.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://attack.mitre.org/techniques/T1027/
author: Faizaan Sajjad
date: 2025/01/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_proc:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_encoded:
        CommandLine|contains:
            - '-EncodedCommand'
            - '-Encoded'
            - ' -Enc '
            - ' -ec '
    selection_cradle:
        CommandLine|contains:
            - 'IEX'
            - 'Invoke-Expression'
            - 'DownloadString'
            - 'FromBase64String'
            - 'Net.WebClient'
            - 'Reflection.Assembly'
    condition: selection_proc and (selection_encoded or selection_cradle)
fields:
    - Image
    - CommandLine
    - ParentImage
    - User
falsepositives:
    - SCCM or Intune management scripts
    - Known security tools using encoded execution
    - Legitimate software using PowerShell for install tasks
level: high
