title: NTLM Password Spray Detection
id: a7f3c2e1-5b4d-4a8f-9c2e-1d3f5a7b9c0e
status: experimental
description: |
    Detects NTLM password spray attacks by identifying a single source IP
    generating failed authentication attempts against multiple distinct accounts
    within a short time window. Password spray differs from brute force:
    low attempts per account, high account breadth.
references:
    - https://attack.mitre.org/techniques/T1110/003/
    - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-4625
author: Faizaan Sajjad
date: 2025/01/01
modified: 2025/01/01
tags:
    - attack.credential_access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
        LogonType: 3
        AuthenticationPackageName: NTLM
    condition: selection | count(TargetUserName) by IpAddress > 10
fields:
    - IpAddress
    - TargetUserName
    - LogonType
    - AuthenticationPackageName
    - WorkstationName
falsepositives:
    - Misconfigured applications retrying with wrong credentials
    - Shared NAT egress points with multiple users behind one IP
    - Password policy enforcement or audit tooling
level: high
